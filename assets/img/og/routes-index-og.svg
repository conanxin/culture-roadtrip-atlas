<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="ri-og-title ri-og-desc">
  <title id="ri-og-title">路线数据索引 · 行旅图谱</title>
  <desc id="ri-og-desc">行旅图谱路线数据索引 · 把人文路线沉淀为可下载、可审校、可复用的 CSV / GeoJSON / GPX 数据资产 · 3 条路线 · 28 段 · 92 个文化复刻粗点。文化复刻粗点 · 非导航。</desc>

  <defs>
    <linearGradient id="paper-ri" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf6ed"/>
      <stop offset="100%" stop-color="#f0e8d4"/>
    </linearGradient>
    <pattern id="paper-tex-ri" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.3" fill="#a8804c" opacity="0.10"/>
      <circle cx="4" cy="3" r="0.3" fill="#2e4f4f" opacity="0.06"/>
      <circle cx="2" cy="5" r="0.2" fill="#a8804c" opacity="0.08"/>
    </pattern>
    <pattern id="lines-ri" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 0 80 L 80 0" stroke="#a8804c" stroke-width="0.4" opacity="0.08" fill="none"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#paper-ri)"/>
  <rect width="1200" height="630" fill="url(#paper-tex-ri)"/>
  <rect width="1200" height="630" fill="url(#lines-ri)"/>

  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#a8804c" stroke-width="1.5" opacity="0.5"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#2e4f4f" stroke-width="0.5" opacity="0.3"/>

  <g>
    <rect x="60" y="60" width="160" height="36" rx="18" fill="#2e4f4f" opacity="0.92"/>
    <text x="140" y="84" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="16" fill="#faf6ed" text-anchor="middle" font-weight="600" letter-spacing="2">行旅图谱</text>
  </g>

  <g>
    <rect x="60" y="110" width="220" height="32" rx="6" fill="#a8804c" opacity="0.18"/>
    <text x="170" y="131" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="14" fill="#a8804c" text-anchor="middle" font-weight="500">v1.5.2 · 路线数据索引</text>
  </g>

  <text x="60" y="220" font-family="'Noto Serif SC', system-ui, serif" font-size="64" fill="#1e3838" font-weight="700" letter-spacing="3">路线数据索引</text>
  <text x="60" y="280" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="24" fill="#4a6e6e" font-weight="400" letter-spacing="2">CSV / GeoJSON / GPX · 可下载 · 可审校 · 可复用</text>

  <line x1="60" y1="310" x2="280" y2="310" stroke="#a8804c" stroke-width="2"/>

  <text x="60" y="360" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="18" fill="#5a5550">把人文路线沉淀为可下载、可审校、可复用的数据资产。</text>
  <text x="60" y="388" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="18" fill="#5a5550">每条路线都带 manifest 驱动 · 跨页面状态徽章与相关路线推荐。</text>

  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="160" height="70" rx="6" fill="#2e4f4f" opacity="0.06" stroke="#2e4f4f" stroke-width="0.5"/>
    <text x="80" y="22" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="11" fill="#a8804c" text-anchor="middle" font-weight="600">路线</text>
    <text x="80" y="52" font-family="'Noto Serif SC', system-ui, serif" font-size="28" fill="#1e3838" text-anchor="middle" font-weight="700">3</text>
  </g>
  <g transform="translate(240, 460)">
    <rect x="0" y="0" width="160" height="70" rx="6" fill="#2e4f4f" opacity="0.06" stroke="#2e4f4f" stroke-width="0.5"/>
    <text x="80" y="22" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="11" fill="#a8804c" text-anchor="middle" font-weight="600">段落</text>
    <text x="80" y="52" font-family="'Noto Serif SC', system-ui, serif" font-size="28" fill="#1e3838" text-anchor="middle" font-weight="700">28</text>
  </g>
  <g transform="translate(420, 460)">
    <rect x="0" y="0" width="160" height="70" rx="6" fill="#2e4f4f" opacity="0.06" stroke="#2e4f4f" stroke-width="0.5"/>
    <text x="80" y="22" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="11" fill="#a8804c" text-anchor="middle" font-weight="600">点位</text>
    <text x="80" y="52" font-family="'Noto Serif SC', system-ui, serif" font-size="28" fill="#1e3838" text-anchor="middle" font-weight="700">92</text>
  </g>
  <g transform="translate(600, 460)">
    <rect x="0" y="0" width="160" height="70" rx="6" fill="#2e4f4f" opacity="0.06" stroke="#2e4f4f" stroke-width="0.5"/>
    <text x="80" y="22" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="11" fill="#a8804c" text-anchor="middle" font-weight="600">SVG</text>
    <text x="80" y="52" font-family="'Noto Serif SC', system-ui, serif" font-size="28" fill="#1e3838" text-anchor="middle" font-weight="700">3</text>
  </g>

  <g transform="translate(60, 558)">
    <rect x="0" y="-2" width="3" height="22" fill="#a8804c"/>
    <text x="14" y="14" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="12" fill="#1e3838" font-weight="500">文化复刻粗点 / 文化自驾粗点</text>
    <text x="14" y="32" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="10" fill="#5a5550">非导航 · 非实时导航 · 出入行前需独立核实</text>
  </g>

  <g transform="translate(1140, 558)" text-anchor="end">
    <text x="0" y="14" font-family="'Noto Serif SC', system-ui, serif" font-size="13" fill="#2e4f4f" font-weight="600" font-style="italic">Culture Roadtrip Atlas</text>
    <text x="0" y="32" font-family="'Noto Sans SC', system-ui, sans-serif" font-size="10" fill="#5a5550">/routes/ · v1.5.2</text>
  </g>
</svg>
